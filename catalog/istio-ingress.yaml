apiVersion: v1
kind: Namespace
metadata:
  name: istio-ingress
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-ingressgateway
  namespace: istio-ingress
spec:
  chart:
    spec:
      chart: gateway
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: istio-system
      version: 1.29.1
  dependsOn:
    - name: istiod
      namespace: istio-system
  interval: 1h
  values:
    autoscaling:
      enabled: false
    imagePullPolicy: IfNotPresent
    service:
      ipFamilyPolicy: PreferDualStack
      ports:
        - name: status-port
          port: 15021
          protocol: TCP
          targetPort: 15021
        - name: http2
          nodePort: 31080
          port: 80
          protocol: TCP
          targetPort: 80
        - name: https
          nodePort: 31443
          port: 443
          protocol: TCP
          targetPort: 443
      type: ${GATEWAY_SERVICE_TYPE:=NodePort}
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: istio
spec:
  controller: istio.io/ingress-controller
