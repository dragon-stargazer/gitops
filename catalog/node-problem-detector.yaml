apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  labels:
    manage-oci-credential: enabled
  name: node-problem-detector
  namespace: kube-system
spec:
  interval: 24h
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  ref:
    tag: 2.4.0
  url: oci://${GHCR_REGISTRY_MIRROR:=ghcr.io}/deliveryhero/helm-charts/node-problem-detector
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-problem-detector
  namespace: kube-system
spec:
  chartRef:
    kind: OCIRepository
    name: node-problem-detector
    namespace: kube-system
  interval: 1h
  values:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: ${ENABLE_SERVICE_MONITOR:=true}
